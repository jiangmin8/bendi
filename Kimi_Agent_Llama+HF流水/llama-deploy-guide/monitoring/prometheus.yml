# ============================================================
# Prometheus 配置 - llama-server 监控
# ============================================================

global:
  scrape_interval: 15s      # 抓取间隔
  scrape_timeout: 10s       # 抓取超时
  evaluation_interval: 15s  # 告警规则评估间隔

# 告警管理
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      # 如需 AlertManager，取消注释并配置
      # - alertmanager:9093

# 告警规则
rule_files:
  - "alert-rules.yml"

# 抓取目标
scrape_configs:
  # ------------------
  # llama-server 指标
  # ------------------
  - job_name: 'llama-server'
    static_configs:
      - targets: ['llama-server:8080']
        labels:
          instance: 'llama-server-main'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # ------------------
  # Prometheus 自身
  # ------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ------------------
  # Node Exporter (宿主机监控，可选)
  # 需额外部署 node-exporter 服务
  # ------------------
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

  # ------------------
  # NVIDIA GPU Exporter (GPU 监控，可选)
  # 需额外部署 dcgm-exporter 或 nvidia_gpu_exporter
  # ------------------
  # - job_name: 'nvidia-gpu'
  #   static_configs:
  #     - targets: ['dcgm-exporter:9400']
