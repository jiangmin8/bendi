# ============================================================
# Grafana 数据源配置
# 自动挂载到 /etc/grafana/provisioning/datasources/
# ============================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "10s"
